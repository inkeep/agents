packages:
  - agents-api
  - agents-manage-ui
  - agents-cli
  - agents-ui-demo
  - agents-docs
  - agents-cookbook
  - test-agents
  - "packages/*"

catalog:
  better-auth: 1.6.9
  "@better-auth/sso": 1.6.9
  "@better-auth/infra": 0.2.5
  "@better-auth/oauth-provider": 1.6.9
  "@opentelemetry/api": ^1.9.0
  "@opentelemetry/auto-instrumentations-node": ^0.75.0
  "@opentelemetry/baggage-span-processor": ^0.5.0
  "@opentelemetry/context-async-hooks": ^2.5.1
  "@opentelemetry/core": ^2.5.1
  "@opentelemetry/exporter-trace-otlp-http": ^0.212.0
  "@opentelemetry/resources": ^2.5.1
  "@opentelemetry/sdk-node": ^0.217.0
  "@opentelemetry/sdk-trace-base": ^2.5.1
  "@opentelemetry/semantic-conventions": ^1.39.0

publicHoistPattern:
  - "@types/react"
  - "@types/react-dom"

ignorePatchFailures: false
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@inkeep/*'

patchedDependencies:
  "@changesets/assemble-release-plan@6.0.9": patches/@changesets__assemble-release-plan.patch
  fumadocs-core: patches/fumadocs-core.patch
  babel-plugin-react-compiler: patches/babel-plugin-react-compiler.patch
  # Adds ZIP-based document (docx/xlsx/pptx/odt/ods/odp/pages/numbers/key) passthrough for
  # Chat and Responses APIs. Patch authored against
  # @ai-sdk/openai@3.0.7 (dist/index.mjs). Remove once upstream Vercel AI SDK supports office MIME types natively.
  "@ai-sdk/openai@3.0.7": patches/@ai-sdk__openai@3.0.7.patch

overrides:
  # NOTE: pnpm 10 silently ignores overrides here when public/agents/package.json
  # declares pnpm.overrides at the same workspace root. The block below is kept
  # as documentation only; the source of truth is public/agents/package.json.
  next: ">=16.2.6" # https://github.com/advisories/GHSA-5f7q-jpqc-wp7h + middleware bypass follow-up
  esbuild: 0.25.9 # we pin it for Cypress
  "@modelcontextprotocol/sdk>zod": ^3.25.7
  "@anthropic-ai/mcpb>zod": ^3.25.7
  preact: "-" # we don't use preact, this removes pnpm audit warnings from posthog-js>preact
  # Security overrides — upstream packages haven't released fixes
  devalue: ">=5.6.3" # @workflow/core pins 5.6.0; DoS + prototype pollution
  rollup: ">=4.59.0" # vite lockfile pins 4.54.0; arbitrary file write
  undici: ">=6.24.0" # @workflow/web pins 6.22.0; unbounded decompression DoS
  fast-xml-parser: ">=5.7.0" # XML comment/CDATA injection
  qs: ">=6.14.2" # body-parser/cypress resolve stale versions; arrayLimit bypass DoS
  axios: ">=1.15.2" # prototype pollution + CRLF + NO_PROXY bypass
  protobufjs: ">=7.5.6 <8 || >=8.0.2" # arbitrary code execution (CRITICAL) + toObject codegen
  "@xmldom/xmldom": ">=0.8.13" # XML injection via CDATA/DocumentType/PI/comment serialization
  flatted: ">=3.4.2" # prototype pollution via parse()
  kysely: ">=0.28.17 <0.29.0"
  "kysely@>=0.29.0": "0.28.17" # SQL injection via JSON path keys + JSON-path traversal
  tar: ">=7.5.11" # symlink/hardlink path traversal
  node-forge: ">=1.4.0" # signature forgery + DoS
  defu: ">=6.1.5" # prototype pollution via __proto__
  "@hono/node-server": ">=1.19.13" # middleware bypass via repeated slashes
  dompurify: ">=3.4.0" # FORBID_TAGS bypass via ADD_TAGS
  serialize-javascript: ">=7.0.5" # CPU exhaustion DoS
  "@babel/plugin-transform-modules-systemjs": ">=7.29.4" # arbitrary code gen from malicious input
  "@opentelemetry/auto-instrumentations-node": ">=0.75.0" # Prometheus exporter crash
  "@opentelemetry/sdk-node": ">=0.217.0" # Prometheus exporter crash
  "@opentelemetry/exporter-prometheus": ">=0.217.0" # Prometheus exporter crash
  systeminformation: ">=5.31.6" # Linux command injection in networkInterfaces()
  fast-uri: ">=3.1.2" # host confusion via percent-encoded authority delimiters
  fast-xml-builder: ">=1.1.7" # attribute injection bypass
  mermaid: ">=11.15.0" # CSS injection via improper config sanitization
  uuid: ">=13.0.1" # buffer bounds check in v3/v5/v6
  file-type: ">=21.3.2" # ZIP decompression bomb DoS
  nodemailer: ">=8.0.5" # SMTP command injection via CRLF
  "@protobufjs/utf8": ">=1.1.1" # overlong UTF-8 decoding
  ip-address: ">=10.1.1" # XSS in Address6 HTML-emitting methods
  postcss: ">=8.5.10" # XSS via unescaped </style>
  follow-redirects: ">=1.16.0" # leaks custom auth headers
  "@nestjs/core": ">=11.1.18" # improper special-element neutralization
  yaml: ">=2.8.3" # stack overflow via deeply nested collections
  brace-expansion: ">=5.0.5" # zero-step sequence process hang
  "ajv@>=6 <6.14.0": ">=6.14.0 <7" # eslint resolves 6.12.6; ReDoS with $data option
  "ajv@>=8 <8.18.0": ">=8.18.0" # direct dep resolves 8.17.1; ReDoS with $data option
  "minimatch@<3.1.3": ">=3.1.3" # @eslint/config-array resolves 3.1.2; ReDoS via wildcards
  "minimatch@>=9 <9.0.6": ">=9.0.6" # @hono/vite-dev-server resolves 9.0.5; ReDoS via wildcards
  "minimatch@>=10 <10.2.1": ">=10.2.1" # glob@13 lockfile pins 10.1.1; ReDoS via wildcards
  "undici@>=7 <7.24.0": ">=7.24.0" # WebSocket parser overflow + permessage-deflate DoS
  "path-to-regexp@<0.1.13": "0.1.13" # ReDoS via multiple route parameters
  "path-to-regexp@>=4 <6.3.0": "6.3.0" # backtracking regex
  "path-to-regexp@>=8 <8.4.0": "8.4.2" # ReDoS via sequential optional groups
  "picomatch@<2.3.2": ">=2.3.2" # ReDoS via extglob quantifiers + POSIX injection
  "picomatch@>=4 <4.0.4": ">=4.0.4" # ReDoS via extglob quantifiers
