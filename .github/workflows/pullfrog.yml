# PULLFROG ACTION — DO NOT EDIT EXCEPT WHERE INDICATED
name: Pullfrog
run-name: ${{ inputs.name || github.workflow }}
on:
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        description: Agent prompt
      name:
        type: string
        description: Run name

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
  actions: read
  checks: read

jobs:
  pullfrog:
    runs-on: ubuntu-latest
    steps:
      # Skip when the targeted PR has the `ai-reviewed-locally` label.
      # The Pullfrog GitHub App dispatches this workflow with `inputs.name`
      # of the form "<Action> #<PR_NUMBER> [<id>]" (e.g., "Review #615 [5hgs7]"),
      # which is the only place the PR number is recoverable from a
      # workflow_dispatch payload. To override per-run, remove the label.
      - name: Check ai-reviewed-locally label
        id: skip-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM=$(printf '%s' "${{ inputs.name }}" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [ -z "$PR_NUM" ]; then
            echo "No PR number in run name '${{ inputs.name }}' — running normally."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LABELS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM" --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          if printf ',%s,' "$LABELS" | grep -q ',ai-reviewed-locally,'; then
            echo "PR #$PR_NUM has ai-reviewed-locally label — skipping pullfrog."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR #$PR_NUM not labeled with ai-reviewed-locally — running normally."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout code
        if: steps.skip-check.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - name: Run agent
        if: steps.skip-check.outputs.skip != 'true'
        uses: pullfrog/pullfrog@560e27bda528739fcfb931a28b48dee81193bcce # v0.0.204
        with:
          prompt: ${{ inputs.prompt }}
        env:
          # add any additional keys your agent(s) need
          # optionally, comment out any you won't use
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL }}  # "provider/model"

