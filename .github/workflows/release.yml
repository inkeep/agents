name: Publish

on:
  workflow_dispatch:
  push:
    paths:
      - ".changeset/**"
      - "packages/**"
      - "agents-cli/**"
      - "agents-api/**"
    branches:
      - main
      - chat-to-edit

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Setup npm for OIDC publishing
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm 11.5.1+ for OIDC support
        run: npm install -g npm@latest

      - name: Setup Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build packages
        run: pnpm build
        env:
          TURBO_TELEMETRY_DISABLED: 1
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0

      - name: Extract version
        id: extract-version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[0].version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Release to snapshot tag
        if: steps.changesets.outputs.published != 'true'
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH_NAME" = "chat-to-edit" ]; then
            TAG_NAME="chat-to-edit"
          else
            TAG_NAME="dev"
          fi
          echo "Publishing to tag: $TAG_NAME"
          git checkout $BRANCH_NAME
          pnpm changeset version --snapshot $TAG_NAME
          pnpm changeset publish --tag $TAG_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0

      # Generate a GitHub App token so the release event triggers downstream
      # workflows (the default GITHUB_TOKEN cannot do this).
      - name: Generate GitHub App Token
        if: steps.changesets.outputs.published == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.INTERNAL_CI_APP_ID }}
          private-key: ${{ secrets.INTERNAL_CI_APP_PRIVATE_KEY }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        shell: bash
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[0].version')
          RELEASE_DATE=$(date +%Y-%m-%d)

          # Get the most recently merged PR's body
          PR_BODY=$(gh pr list --state merged --base main --json body,mergedAt --jq 'sort_by(.mergedAt) | last | .body')

          # Extract everything from "# Releases" onward and replace with "# Changelog"
          CHANGELOG=$(echo "$PR_BODY" | sed -n '/^# Releases/,$p' | sed '1s/^# Releases/# Changelog/')

          # Pin the release tag to the exact commit that was built and published.
          # The app token ensures the release:published event triggers the
          # downstream Vercel production deploy workflow.
          gh release create "v${VERSION}" \
            --target "${{ github.sha }}" \
            --title "${RELEASE_DATE}" \
            --notes "$CHANGELOG"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  docker-publish:
    name: Docker Publish (${{ matrix.image }})
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - agents-api
          - agents-manage-ui
          - agents-migrate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: create-agents-template
          file: create-agents-template/Dockerfile.${{ matrix.image }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            inkeep/${{ matrix.image }}:${{ needs.release.outputs.version }}
            inkeep/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  update-docker-compose:
    name: Update docker-compose image tags
    needs: [release, docker-publish]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.INTERNAL_CI_APP_ID }}
          private-key: ${{ secrets.INTERNAL_CI_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Update image tags
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          sed -i "s|image: inkeep/agents-api:.*|image: inkeep/agents-api:${VERSION}|g" create-agents-template/docker-compose.yml
          sed -i "s|image: inkeep/agents-manage-ui:.*|image: inkeep/agents-manage-ui:${VERSION}|g" create-agents-template/docker-compose.yml
          sed -i "s|image: inkeep/agents-migrate:.*|image: inkeep/agents-migrate:${VERSION}|g" create-agents-template/docker-compose.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add create-agents-template/docker-compose.yml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update Docker image tags to v${{ needs.release.outputs.version }} [skip ci]"
          git push
