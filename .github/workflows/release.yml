name: Publish

on:
  workflow_dispatch:
  push:
    paths:
      - ".changeset/**"
      - "packages/**"
      - "agents-cli/**"
      - "agents-api/**"
    branches:
      - main
      - chat-to-edit

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          # Do not persist the default GITHUB_TOKEN credentials. actions/checkout
          # sets http.https://github.com/.extraheader with an AUTHORIZATION header
          # that overrides URL-embedded tokens. This prevents changesets/action from
          # pushing with the App token (set via github-token input), causing GitHub
          # to treat the push as GITHUB_TOKEN and skip triggering downstream workflows.
          persist-credentials: false

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Setup npm for OIDC publishing
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm 11.5.1+ for OIDC support
        run: |
          if npm install -g npm@latest 2>/dev/null; then
            echo "npm upgraded via bundled npm"
          else
            echo "::warning::Bundled npm broken, bootstrapping from tarball"
            NPM_VER=$(node -e "fetch('https://registry.npmjs.org/npm/latest').then(r=>r.json()).then(d=>console.log(d.version))")
            curl -fsSL "https://registry.npmjs.org/npm/-/npm-${NPM_VER}.tgz" | tar xz -C /tmp
            node /tmp/package/bin/npm-cli.js install -g "npm@${NPM_VER}"
            rm -rf /tmp/package
          fi
          echo "npm $(npm --version)"

      - name: Setup Turborepo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build packages
        run: pnpm build
        env:
          TURBO_TELEMETRY_DISABLED: 1
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      # Generate a GitHub App token so that PRs and releases created by this
      # workflow trigger downstream CI workflows. The default GITHUB_TOKEN
      # cannot do this (GitHub security restriction).
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.INTERNAL_CI_APP_ID }}
          private-key: ${{ secrets.INTERNAL_CI_APP_PRIVATE_KEY }}

      # Pass the App token as the github-token INPUT to changesets/action.
      # The action internally runs `git remote set-url` using its github-token
      # input before pushing. If only the GITHUB_TOKEN env var is overridden,
      # the action's input still defaults to github.token (the built-in token),
      # and GitHub silently ignores pushes from GITHUB_TOKEN for triggering
      # downstream workflows. Passing the App token as the input ensures the
      # force-push to changeset-release/main fires pull_request.synchronize.
      - name: Publish packages
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          publish: pnpm release
          createGithubReleases: false
          github-token: ${{ steps.app-token.outputs.token }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          HUSKY: 0

      - name: Release to snapshot tag
        if: steps.changesets.outputs.published != 'true'
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH_NAME" = "chat-to-edit" ]; then
            TAG_NAME="chat-to-edit"
          else
            TAG_NAME="dev"
          fi
          echo "Publishing to tag: $TAG_NAME"
          git checkout $BRANCH_NAME
          pnpm changeset version --snapshot $TAG_NAME
          pnpm changeset publish --tag $TAG_NAME
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          HUSKY: 0

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        shell: bash
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[0].version')
          RELEASE_DATE=$(date +%Y-%m-%d)

          # Get the most recently merged PR's body
          PR_BODY=$(gh pr list --state merged --base main --json body,mergedAt --jq 'sort_by(.mergedAt) | last | .body')

          # Extract everything from "# Releases" onward and replace with "# Changelog"
          CHANGELOG=$(echo "$PR_BODY" | sed -n '/^# Releases/,$p' | sed '1s/^# Releases/# Changelog/')

          # Pin the release tag to the exact commit that was built and published.
          # The app token ensures the release:published event triggers the
          # downstream Vercel production deploy workflow.
          gh release create "v${VERSION}" \
            --target "${{ github.sha }}" \
            --title "${RELEASE_DATE}" \
            --notes "$CHANGELOG"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
